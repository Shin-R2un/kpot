## 1. 概要

`kpot`（key pot）は**暗号化された CLI ノート保管庫**です。  
API キー・パスワード・SSH 接続情報・秘密メモなどをひとつの `.kpot` ファイルに安全に保存します。

### 特徴

| 機能 | 詳細 |
|------|------|
| 暗号化方式 | Argon2id (64 MiB / 3 / 1) + XChaCha20-Poly1305 |
| 改ざん検出 | ヘッダー全体を AAD として AEAD で保護 |
| リカバリーキー | BIP-39 シードフレーズ (12/24語) または Crockford Base32 秘密鍵 |
| DEK 分離 | v2 vault は DEK をパスフレーズ wrap + recovery wrap で二重保護 |
| OS キーチェーン | macOS / Linux (secret-tool) / Windows (Credential Manager) 対応 |
| 原子書き込み | `.tmp` → `.bak` → 本体 の 2-phase rename |
| アイドルロック | 無操作 N 分でセッション自動ロック (デフォルト 10 分) |
| ノート編集 | `$EDITOR` 連携、一時ファイルは `/dev/shm` に配置 |
| TAB 補完 | TTY 接続時はコマンド名・ノート名を補完 (liner) |
| クリップボード | コピー後 30 秒で自動消去 (設定変更可) |
| バンドル転送 | 選択したノートを `.kpb` ファイルに暗号化して共有 |

## 2. インストール

### ワンライナーインストール (Linux / macOS)

```bash
curl -fsSL https://raw.githubusercontent.com/Shin-R2un/kpot/main/install.sh | sh
```

### ワンライナーインストール (Windows PowerShell)

```powershell
irm https://raw.githubusercontent.com/Shin-R2un/kpot/main/install.ps1 | iex
```

### Go でビルド

```bash
git clone https://github.com/Shin-R2un/kpot.git
cd kpot
make build       # ./kpot を生成
make test        # 全テスト実行
make install     # $(go env GOPATH)/bin/kpot にインストール
```

### 動作要件

- Go 1.18 以上 (ビルド時)
- Linux / macOS / Windows
- クリップボード: `xclip` または `wl-clipboard` (Linux), `pbcopy` (macOS), PowerShell (Windows)
- OS キーチェーン (任意): `libsecret-tools` (Linux), macOS 標準, Windows 標準

## 3. クイックスタート

### 3.1 v0.7+ 推奨フロー（ベアネーム + 既定 vault）

```bash
# 0. (初回のみ) 設定ファイルの雛形を生成
kpot config init
$EDITOR $(kpot config path)
# vault_dir と default_vault を設定。例:
#   vault_dir = "~/.kpot"
#   default_vault = "personal"

# 1. 保管庫を作成 (~/.kpot/personal.kpot に生成、ディレクトリも自動作成)
kpot init personal

# 2. 既定 vault を REPL で開く (パスや拡張子は不要)
kpot

# 3. REPL 内で v0.6 のコンテキスト UX を活用
kpot:personal> note ai/openai           # $EDITOR でノートを作成・編集
kpot:personal> ls                       # ノート一覧
kpot:personal> cd ai/openai             # ノートコンテキストへ入る
kpot:personal/ai/openai> show           # 全文表示
kpot:personal/ai/openai> show url       # url フィールドだけ表示
kpot:personal/ai/openai> cp apikey      # apikey をクリップボード (30秒自動消去)
kpot:personal/ai/openai> set apikey     # 秘密値は TTY 非表示入力
kpot:personal/ai/openai> fields         # フィールド一覧
kpot:personal/ai/openai> cd /           # ルートに戻る
kpot:personal> exit
```

### 3.2 従来フロー（パス指定、引き続き完全サポート）

```bash
# 1. 新しい保管庫を作成 (リカバリーシードが一度だけ表示される)
kpot init personal.kpot

# 2. 保管庫を開いて REPL に入る
kpot personal.kpot

# 3. REPL 内で操作
kpot:personal> read ai/openai      # ノートを表示 (show のエイリアス)
kpot:personal> copy ai/openai      # クリップボードにコピー
kpot:personal> find openai         # 検索
kpot:personal> rm ai/openai        # 削除 (確認あり)
kpot:personal> exit
```

## 4. コマンドリファレンス

### 4.1 init

```
kpot init <file> [--recovery seed|key] [--recovery-words 12|24]
```

新しい暗号化保管庫を作成します。**v0.3 以降は常にリカバリーキーが生成されます。**

| オプション | 説明 | デフォルト |
|-----------|------|----------|
| `--recovery seed` | BIP-39 ニーモニックシードフレーズを生成 | ✓ デフォルト |
| `--recovery key` | Crockford Base32 秘密鍵を生成 | — |
| `--recovery-words 12` | 12語のシード (128bit エントロピー) | ✓ デフォルト |
| `--recovery-words 24` | 24語のシード (256bit エントロピー) | — |

```bash
# デフォルト (12語シード)
kpot init personal.kpot

# 24語シード
kpot init personal.kpot --recovery seed --recovery-words 24

# 秘密鍵形式
kpot init personal.kpot --recovery key
```

> ⚠️ **リカバリーキーは init 時に一度だけ表示されます。必ず紙に書き留めてください。**  
> 紛失した場合、パスフレーズを忘れると vault は復元不能になります。

---

### 4.2 REPL モード

```
kpot                                  # 既定 vault を開く (要 default_vault 設定)
kpot <name|file> [--recover] [--no-cache] [--forget]
```

インタラクティブなシェルに入ります。引数がベアネーム (`personal`) の場合は
`<vault_dir>/personal.kpot` に解決されます (詳細は §7)。

| オプション | 説明 |
|-----------|------|
| `--recover` | リカバリーキーでパスフレーズなしに開く |
| `--no-cache` | OS キーチェーンキャッシュを使わない |
| `--forget` | キャッシュされたキーを削除してから開く |

```bash
kpot                          # default_vault 起動 (v0.7+)
kpot personal                 # ~/.kpot/personal.kpot 起動 (v0.7+)
kpot personal.kpot            # 従来通り
kpot ./local.kpot --recover   # 相対パスもサポート
kpot personal --no-cache      # キャッシュ無効
```

---

### 4.3 シングルショットモード

```
kpot <name|file> <command> [args...]
```

REPL に入らず、コマンドを 1 回だけ実行します。スクリプトや CI 向けです。

```bash
kpot personal ls                          # ベアネーム (v0.7+)
kpot personal read ai/openai
kpot personal show ai/openai              # show は read のエイリアス (v0.6+)
kpot personal cp ai/openai                # cp は copy の v0.6+ 拡張
kpot personal rm -y old/key
kpot personal export -o backup.json --force
kpot ~/secrets/work.kpot ls               # 絶対 / 相対パスも当然動作
```

> v0.6 で導入された `cd` / `pwd` / `fields` / `set` / `unset` は **REPL 専用**です。
> シングルショットでは現在のノートコンテキストを保持できないため。

---

### 4.4 REPL コマンド詳細

#### `ls`
ノート一覧を表示します。

```
kpot:personal> ls
ai/anthropic
ai/openai
server/fw0
```

---

#### `note <name>`
ノートを `$EDITOR` で作成・編集します。  
テンプレートが適用され、フロントマター (作成日・更新日) が自動付与されます。

```
kpot:personal> note ai/openai
```

---

#### `read <name>` / `show [<arg>]` (v0.6+)

`show` はコンテキスト UX を持つ表示コマンド。`read` は v0.5 までの形式で
1 引数必須の **`show` のエイリアス**として維持されています。

```
kpot:personal> read ai/openai      # 1 引数必須 (従来通り)
OPENAI_API_KEY=sk-...

kpot:personal> show ai/openai      # 引数があればそのノートを表示
kpot:personal> show                # 現在のノートコンテキストを表示
                                   # (cd 後でないとエラー)
kpot:personal> show url            # 現在のノートの url フィールドだけ
```

`show <arg>` の解決順: ① `<arg>` がノート名と完全一致 → そのノート全文 ② 現在
ノートコンテキストが設定されていれば、`<arg>` をフィールド名として扱い値を表示。

---

#### `copy <name>` / `cp [<arg>]` (v0.6+)
ノート本文または特定フィールドをクリップボードにコピーします。  
デフォルト 30 秒後に自動消去されます (設定変更可)。

`copy` は v0.5 互換 (1 引数必須・ノート名のみ)。`cp` は `show` と同じ
コンテキスト解決を持つ拡張版。

```
kpot:personal> copy ai/openai             # 従来形式
copied ai/openai via xclip (auto-clears in 30s)

kpot:personal/ai/openai> cp apikey        # 現在ノートの field をコピー
copied field "apikey" from ai/openai via xclip (auto-clears in 30s)

kpot:personal/ai/openai> cp               # 現在ノートを丸ごとコピー
```

---

#### `cd <note>` / `cd ..` / `cd /` (v0.6+)
ノートコンテキストを設定 / 解除します。

| 入力 | 動作 |
|---|---|
| `cd ai/openai` (完全一致) | コンテキストを `ai/openai` に設定。プロンプトは `kpot:personal/ai/openai>` |
| `cd ai` (グループ) | `ai` というノートが無く `ai/...` が複数ある場合、候補一覧を表示。コンテキストは変更しない |
| `cd ..` / `cd /` | コンテキストをルートに戻す (どちらも同じ。MVP では階層を 1 つ上がるのではなく即ルート復帰) |

```
kpot:personal> cd ai/openai
kpot:personal/ai/openai> pwd
/ai/openai

kpot:personal> cd ai
"ai" is a group, not a note.

Matching notes:
  ai/openai
  ai/claude

Use:
  cd ai/openai
```

---

#### `pwd` (v0.6+)
現在のノートコンテキストを表示します。

```
kpot:personal> pwd
/

kpot:personal/ai/openai> pwd
/ai/openai
```

---

#### `fields` (v0.6+)
現在のノートから抽出された `key: value` 形式のフィールド一覧を表示します。

```
kpot:personal> cd ai/openai
kpot:personal/ai/openai> fields
id
url
apikey
pass
token
```

ノートコンテキストが設定されていない場合は `No current note. Use 'cd <note>' first.` を表示
します (エラーではなく案内)。

---

#### `set <field> [<value>]` (v0.6+)
現在のノートのフィールドを更新します。

| 入力 | 動作 |
|---|---|
| `set url https://api.example.com` | 値を直接指定して更新 |
| `set apikey` | TTY 非エコー入力でプロンプト (秘密値) |
| `set pass mypassword` | **拒否** — 秘密値を引数渡しすると liner の REPL 履歴に残るため |

秘密値として扱われるフィールド名 (大文字小文字無視):

```
pass / password / pwd / pin
apikey / api_key / api-key / key / token / secret
client_secret / client-secret
otp / totp / otp_seed / otp-seed
private_key / private-key / ssh_key / ssh-key
```

これらに該当するフィールドを引数付きで `set` しようとすると拒否されます。
代わりに引数なしで呼び出すと TTY から非エコーで値を受け取ります。

該当フィールドが存在しない場合は新規追加されます (フィールドブロックの末尾、
あるいはタイトル直後)。

```
kpot:personal/ai/openai> set url https://api.openai.com
updated field "url"

kpot:personal/ai/openai> set apikey
New value for apikey: ****
updated field "apikey"
```

---

#### `unset <field>` (v0.6+)
現在のノートからフィールドを削除します。存在しないフィールドはエラー。

```
kpot:personal/ai/openai> unset old_field
removed field "old_field"
```

---

#### `find <query>` (v0.10+ で番号付き)
ノート名・本文を大文字小文字を区別せずに検索します。v0.10 から結果に
番号が付き、直後に `cd <N>` / `show <N>` / `cp <N> <field>` で
参照できます。

```
kpot:personal> find github
1  accounts/github-main      (name)
2  dev/github-pat            (body)  token: ghp_xxx
kpot:personal> cd 1
kpot:personal/accounts/github-main> cp pass
copied field "pass" from accounts/github-main
```

番号空間は `find` と `recent` で共有されます。新しい `find` を実行すると
前の選択は置き換えられます。`ls` / `pwd` / `fields` / `trash` などは
触りません。

literal note 名 `1` が存在 + 直前の selection あり → numeric が優先されます
(find 結果の 1 件目)。回避手段は将来検討です。

---

#### `recent` (v0.10+)
最近アクセスした note (cd / show / cp で触ったもの) を新しい順に
最大 20 件表示し、`cd <N>` / `show <N>` / `cp <N> ...` の番号空間に
セットします。

```
kpot:personal> recent
1  accounts/github-main
2  ai/openai
3  server/fw0
kpot:personal> cd 2
```

履歴は vault payload 内に暗号化して保存されます。外部ファイルには出ません。

---

#### `rm [-y] <name|N>` (v0.10+ で trash 化)
ノートを **trash に移動** します (物理削除ではなくなりました)。`restore`
で取り戻せます。`-y` は確認 prompt をスキップしますが、操作はあくまで
可逆です。永久削除したい場合は `rm` → `purge` の 2 ステップ。

```
kpot:personal> rm ai/openai
move note "ai/openai" to trash? [y/N]: y
moved to trash: ai/openai.deleted-20260501-153012
  (use 'restore' to bring it back, or 'purge' to delete permanently)
```

`find` の結果から数字でも消せます (`rm 1`)。

---

#### `trash` (v0.10+)
trash の中身を新しい順に表示します。

```
kpot:personal> trash
1  ai/openai.deleted-20260501-153012     deleted just now
2  old/service.deleted-20260430-091122    deleted 1 d ago
```

**注**: trash 表示の番号は `cd` / `show` / `cp` の selection には
入りません (`restore` / `purge` は trash key で指定するため、混在を避ける
設計)。

---

#### `restore <trash-name>` (v0.10+)
trash から元の名前へ戻します。元名に live note が新しくできていれば
エラーになり、trash も live もそのまま (上書きしません)。

```
kpot:personal> restore ai/openai.deleted-20260501-153012
restored: ai/openai
```

---

#### `purge <trash-name>` / `purge --all` (v0.10+)
trash の永久削除。1 エントリだけ消す形と全消しの形があります。

```
# 単一削除 (確認あり)
kpot:personal> purge ai/openai.deleted-20260501-153012
permanently delete "ai/openai.deleted-20260501-153012"? [y/N]: y
purged: ai/openai.deleted-20260501-153012

# 全削除 (PURGE と打たないと動かない)
kpot:personal> purge --all
Type 'PURGE' to permanently delete all 12 trash entries: PURGE
purged 12 entries
```

`-y` で 1 件 purge の確認はスキップできますが、`purge --all` の
"PURGE" 入力は **どんな flag でもスキップ不可** です (誤操作で全消失する
リスクが高すぎるため)。

---

#### `passphrase`
パスフレーズを変更します。  
v2 vault では DEK は保持され、リカバリーキーは引き続き有効です。

```
kpot:personal> passphrase
New passphrase: 
Repeat: 
passphrase changed; previous .bak removed
```

---

#### `recovery-info`
リカバリーキーの種別を表示します (シークレットは表示しません)。

```
kpot:personal> recovery-info
Recovery: seed-bip39 (12 words)
```

#### `template` / `template show` / `template reset`
新規ノートのテンプレートを管理します。

```
kpot:personal> template show      # 現在のテンプレートを表示
kpot:personal> template           # $EDITOR でテンプレートを編集
kpot:personal> template reset     # 組み込みデフォルトに戻す
```

---

#### `export [-o <path>] [--force]`
復号した vault の内容を JSON で出力します。  
デフォルトは stdout。ファイルに書き出す場合は `--force` が必要です。

```
kpot:personal> export
kpot:personal> export -o backup.json --force
```

> ⚠️ ファイルに書き出した場合、平文 JSON がディスクに残ります。使用後は削除してください。

---

#### `import <file> [--mode merge|replace] [-y]`
JSON ファイルからノートをインポートします。

| オプション | 説明 |
|-----------|------|
| `--mode merge` | 既存ノートを保持し、新規ノートを追加 (デフォルト) |
| `--mode replace` | 全ノートを置き換え |
| `-y` | 確認をスキップ |

衝突したノートは `.conflict-YYYYMMDD` サフィックスで保存されます。

```
kpot:personal> import backup.json --mode merge
kpot:personal> import backup.json --mode replace -y
```

---

#### `bundle <name>... -o <path> [--force]`
選択したノートを暗号化 `.kpb` ファイルにエクスポートします。  
別パスフレーズで保護するため、受信者は元の vault のパスフレーズを知らなくても構いません。

```
kpot:personal> bundle ai/openai server/fw0 -o transfer.kpb
Bundle passphrase (recipient will need it): 
wrote 2 notes to transfer.kpb
note: share the passphrase via a separate channel
```

---

#### `import-bundle <path> [-y]`
`.kpb` ファイルを復号して現在の vault にマージします。

```
kpot:personal> import-bundle transfer.kpb
Source bundle passphrase: 
bundle contains 2 notes:
  ai/openai   OPENAI_API_KEY=sk-...
  server/fw0  Host: example.com
import 2 notes into this vault? [y/N]: y
imported: +2 new, 0 conflicts renamed (.conflict-YYYYMMDD)
```

---

#### `exit` / `quit` / `q`
REPL を終了します。

### 4.6 config サブコマンド (v0.8+)

設定ファイルの管理コマンド。手書きで作る代わりに使えます。

```
kpot config init [--force]   # 雛形を OS 既定パスに書き出す
kpot config show             # 実効設定を TOML 形式で表示
kpot config path             # 設定ファイルのパスを表示
```

```bash
$ kpot config path
/home/shin/.config/kpot/config.toml

$ kpot config init
✓ wrote /home/shin/.config/kpot/config.toml
  Edit it with: $EDITOR /home/shin/.config/kpot/config.toml

$ kpot config show
# config file: /home/shin/.config/kpot/config.toml
# values below include defaults applied for absent keys

# editor unset — falls back to $EDITOR / $VISUAL / built-ins
clipboard_clear_seconds = 30
keychain = "auto"
idle_lock_minutes = 10
vault_dir = "/home/shin/.kpot"
# default_vault unset — bare 'kpot' prints usage
```

`config init` は既存ファイルを上書きしません (`--force` で明示的に上書き)。
雛形はコメント付きで全キーを網羅しているので、これだけで設定リファレンスとして機能します。

設定ファイルの保存先は OS 別:

| OS | パス |
|---|---|
| Linux | `$XDG_CONFIG_HOME/kpot/config.toml` (通常 `~/.config/kpot/config.toml`) |
| macOS | `~/Library/Application Support/kpot/config.toml` |
| Windows | `%AppData%\kpot\config.toml` |

`config init` で作られる親ディレクトリは `0o700`、ファイルは `0o600` で保存されます。

### 4.7 serve サブコマンド (v0.9+)

スマホからの read-only WebUI。SSH トンネル + VPN 経由でアクセスする前提。

```
kpot serve <name|file> [--port 8765] [--idle 30] [--no-cache]
```

```bash
# サーバー側 (FW0 等)
kpot serve 1pswd --idle 30

# スマホ側 (Termius / Blink Shell / JuiceSSH)
ssh -L 8765:127.0.0.1:8765 user@fw0
# → 別アプリ (mobile Safari / Chrome) で http://localhost:8765/
```

機能:
- 検索 (note 名 + 本文の case-insensitive substring)
- field 単位 / note 全体のクリップボードコピー (iOS Safari の同期ジェスチャ要件に対応)
- 秘密 field の表示/非表示トグル + 5 秒自動再隠蔽
- `url:` field をブラウザで開く
- session idle ロック (既定 30 分) → web フォームで再 passphrase
- OS keychain にキャッシュがあれば daemon 起動時に silent unlock (`--no-cache` で無効化可能)

セキュリティ:
- `127.0.0.1` のみ bind (`--bind 0.0.0.0` フラグは意図的に無し)
- 完全 read-only (ノート編集は引き続き REPL/CLI)
- session cookie は HttpOnly + SameSite=Strict
- login rate limit (3 fail / 60s → 30s lockout)
- DEK は logout / idle / SIGINT で zero 化

詳細は [`docs/serve.md`](serve.md) を参照 (SSH トンネルのレシピ、iOS のクリップボード制限、
API リファレンス、auto-fill が技術的に不可能な理由 等)。

## 5. ノート名のルール

v0.6.1 で **Unicode 対応** されました。日本語・キリル・ギリシャ等の文字をノート名に使えます。

| ルール | 詳細 |
|-------|------|
| 使用可能文字 | Unicode 文字 (`unicode.IsLetter`) + 数字 (`unicode.IsDigit`) + `. - _ /` |
| 大文字 | ASCII 部分のみ自動的に小文字に変換 (`OpenAI` → `openai`)。日本語等は不変 |
| 長さ | 1〜128 **runes** (バイトではなく文字数) |
| `/` | 階層区切りとして使用可能 |
| 先頭・末尾の `/` | 不可 |
| 連続した `//` | 不可 |
| 拒否される文字 | 絵文字、記号 (`★`, `🔑`)、空白、`$`/`*`/`?` 等のシェル意味文字、全角スラッシュ `／` |

```bash
# 有効な名前
ai/openai
server/prod/db
my-secret_key.v2
password/のりお            # ← v0.6.1+
работа/почта              # ← v0.6.1+ (キリル)
alpha/βeta                # ← v0.6.1+ (ラテン+ギリシャ)
日本語

# 無効な名前 (エラー)
/leading-slash
trailing/slash/
double//slash
has space
login/🔑                  # 絵文字は拒否
a★b                      # 記号は拒否
a／b                      # 全角スラッシュは `/` ではないので拒否
UPPERCASE                 # → uppercase に自動変換 (これは有効)
```

## 7. 設定ファイル

`~/.config/kpot/config.toml` (Linux) または OS 別の設定ディレクトリに配置します。
v0.8 以降は `kpot config init` で雛形を自動生成できます (§4.6 参照)。

```toml
# v0.7+: ベアネーム vault 解決のベースディレクトリ。`~/` は読み込み時に展開。
# 空 / 不在のときは ~/.kpot がデフォルト。
vault_dir = "~/.kpot"

# v0.7+: 引数なし `kpot` で開く既定 vault。
# CLI 引数と同じ解決ルール (バーネネーム → vault_dir/<name>.kpot)。
# 空 / 不在のときは引数なし `kpot` は help を表示。
default_vault = "personal"

# 使用するエディタ ($EDITOR / $VISUAL より優先される)
editor = "vim"

# クリップボード自動消去までの秒数 (デフォルト: 30)
clipboard_clear_seconds = 60

# OS キーチェーン動作 ("auto" | "always" | "never", デフォルト: "auto")
keychain = "auto"

# REPL アイドルロックまでの分数 (デフォルト: 10、シングルショットには無効)
idle_lock_minutes = 15
```

### vault_dir の解決ルール (v0.7+)

`kpot <name>` のベアネーム引数 / `default_vault` の値は以下の順で解決されます:

1. 入力が `~/` で始まる → ホームディレクトリに展開
2. 入力に `/` または `\` が含まれる → そのままパスとして扱う (パススルー)
3. 入力が `.kpot` 拡張子で終わり、かつ CWD にそのファイルが存在 → CWD のファイルを採用 (後方互換)
4. それ以外 (ベアネーム) → `<vault_dir>/<name>.kpot` に解決

**セキュリティ注: バーネネーム (`personal` 等) は CWD を見ません**。これは「悪意ある repo が
`personal.kpot` を root に置いて `cd repo && kpot personal` で実 vault を shadow する」
phishing を防ぐためです。`.kpot` サフィックスを明示した場合のみ CWD のファイルを優先します。

### vault_dir のパーミッション

`kpot init` 実行時、`vault_dir` (デフォルト `~/.kpot`) は **`0o700`** に締められます。
他ツールが緩いモードで作っていても自動的にクランプされるので、同マシンの別ユーザーから
ファイル名一覧を覗かれることはありません (Windows は NTFS ACL に委譲、no-op)。

各 vault ファイル (`*.kpot`) も AEAD 暗号化されているため、漏れてもパスフレーズ無しでは
読めません。`vault_dir` ごと漏れた場合に露出する **メタデータ**は: ① 持っている vault 名
の一覧、② 各 vault のおおよその件数 (ファイルサイズで推測可能)、③ 更新タイムスタンプ。
これが脅威モデルに該当する場合は `vault_dir` を tmpfs や暗号化外付けに移してください。

## 9. リカバリーキー

v0.3 以降の vault はすべてリカバリーキーを持ちます。  
パスフレーズを忘れた場合でも、リカバリーキーがあれば vault を開けます。

### 種類

#### BIP-39 シードフレーズ (デフォルト)

```
 1. abandon      2. ability      3. able         4. about
 5. above        6. absent       7. absorb        8. abstract
 9. absurd      10. abuse       11. access       12. accident
```

- 12語 (128bit) または 24語 (256bit) のニーモニック
- 業界標準の BIP-39 形式
- オフラインで保管 (金庫・紙など)

#### Crockford Base32 秘密鍵

```
AAAAAAAA-BBBBBBBB-CCCCCCCC-DDDDDDDD-EEEEEEEE-FFFFFFF0-GGGGGGGG
```

- 32バイト (256bit) のランダムシークレット
- O→0, I→1, L→1 の誤字自動修正 (Crockford 仕様)
- 8文字区切りで読み上げ・手書きしやすい

### リカバリーキーで vault を開く

```bash
kpot personal.kpot --recover
Enter recovery seed (or secret key): abandon ability able ...
```

### セキュリティ特性

- リカバリーキーは **init 時に一度だけ `/dev/tty` に表示**され、ログに残りません
- パスフレーズを変更 (`passphrase`) してもリカバリーキーは**引き続き有効**です
- DEK (Data Encryption Key) が分離されているため、パスフレーズ変更時に DEK は変わりません

## 10. OS キーチェーン連携

一度パスフレーズを入力すると、OS のネイティブシークレットストアに vault の開錠キーをキャッシュします。  
次回以降はパスフレーズ入力・Argon2id 計算をスキップして高速に開けます。

### 対応バックエンド

| OS | バックエンド | 必要条件 |
|----|------------|---------|
| macOS | Apple Security Services | 標準搭載 |
| Linux | GNOME Secret Service (secret-tool) | `libsecret-tools` + D-Bus セッション |
| Windows | Windows Credential Manager | 標準搭載 |

### Linux でのセットアップ

```bash
# Ubuntu / Debian
sudo apt install libsecret-tools

# Fedora / RHEL
sudo dnf install libsecret

# Arch
sudo pacman -S libsecret
```

### キャッシュ管理

```bash
kpot keychain test                    # 動作確認
kpot personal.kpot --forget           # キャッシュ削除
kpot personal.kpot --no-cache         # キャッシュを使わずに開く
```

### 設定

```toml
# config.toml
keychain = "auto"    # 初回だけ確認 (デフォルト)
keychain = "always"  # 常にキャッシュ
keychain = "never"   # キャッシュしない
```

---

## 11. アイドルロック

REPL セッションで一定時間操作がないと自動的にセッションを終了します。

- **デフォルト**: 10 分
- タイムアウト時にキーマテリアルを消去して終了します
- コマンドを実行するたびにタイマーがリセットされます
- 非 TTY 環境 (パイプ等) では発動しません

### 設定

```toml
# config.toml
idle_lock_minutes = 5   # 5分でロック
idle_lock_minutes = 0   # デフォルト (10分)
```

## 12. バンドル転送 (.kpb)

選択したノートだけを暗号化した `.kpb` (kpot bundle) ファイルに書き出し、別の vault へ安全に転送できます。

### 用途

- チームメンバーへの認証情報共有
- 別の vault への選択的なコピー
- バックアップの一部を切り出して共有

### 仕組み

```
bundle passphrase
    ↓ Argon2id
    KEK (Key Encryption Key)
    ↓ XChaCha20-Poly1305
    BEK (Bundle Encryption Key)  ← wrapped_bek フィールドに格納
    ↓ XChaCha20-Poly1305
    Payload (notes JSON)
```

### バンドル作成

```bash
# REPL から
kpot:personal> bundle ai/openai server/fw0 -o transfer.kpb

# シングルショット
kpot personal.kpot bundle ai/openai server/fw0 -o transfer.kpb
```

### バンドルのインポート

```bash
# REPL から
kpot:work> import-bundle transfer.kpb

# シングルショット
kpot work.kpot import-bundle transfer.kpb -y
```

### 注意

- バンドルパスフレーズは受信者に別チャネルで伝えてください
- `KPOT_BUNDLE_PASSPHRASE` 環境変数でバイパス可能 (CI 用途)
- 同名ノートは `.conflict-YYYYMMDD` にリネームされ、**上書きされません**

---

## 13. ファイルフォーマット

### vault ファイル (.kpot)

```json
{
  "format": "kpot",
  "version": 2,
  "passphrase_wrap": {
    "kind": "passphrase",
    "kdf": {
      "name": "argon2id",
      "salt": "<base64>",
      "params": { "memory_kib": 65536, "iterations": 3, "parallelism": 1 }
    },
    "nonce": "<base64 24B>",
    "wrapped_dek": "<base64>"
  },
  "recovery_wrap": {
    "kind": "seed-bip39",
    "kdf": { "name": "pbkdf2-sha512", "iterations": 2048 },
    "nonce": "<base64 24B>",
    "wrapped_dek": "<base64>"
  },
  "cipher": {
    "name": "xchacha20-poly1305",
    "nonce": "<base64 24B>"
  },
  "payload": "<base64 ciphertext + 16B Poly1305 tag>"
}
```

### v1 vault (旧形式・後方互換)

v0.1/v0.2 で作成した vault はそのまま使えます。  
DEK は KDF 鍵と同一です (リカバリーキーなし)。

### プレーンテキスト (復号後)

```json
{
  "version": 1,
  "created_at": "2026-04-27T00:00:00Z",
  "updated_at": "2026-04-27T12:00:00Z",
  "template": "",
  "notes": {
    "ai/openai": {
      "body": "OPENAI_API_KEY=sk-...",
      "created_at": "2026-04-27T00:00:00Z",
      "updated_at": "2026-04-27T12:00:00Z"
    }
  }
}
```

### バンドルファイル (.kpb)

```json
{
  "format": "kpot-bundle",
  "version": 1,
  "kdf": { "name": "argon2id", "salt": "<base64>", "params": { ... } },
  "wrap_nonce": "<base64>",
  "wrapped_bek": "<base64>",
  "cipher": { "name": "xchacha20-poly1305" },
  "nonce": "<base64>",
  "payload": "<base64>"
}
```

## 14. セキュリティ設計

### 暗号プリミティブ

| 用途 | アルゴリズム | パラメータ |
|------|------------|----------|
| パスフレーズ → KEK | Argon2id | m=64MiB, t=3, p=1 |
| シードフレーズ → KEK | PBKDF2-HMAC-SHA512 | 2048回 |
| 秘密鍵 → KEK | HKDF-SHA256 | — |
| DEK 暗号化 (wrap) | XChaCha20-Poly1305 | 24B nonce |
| ペイロード暗号化 | XChaCha20-Poly1305 | 24B nonce |
| ナンス生成 | crypto/rand | — |

### AAD (追加認証データ)

ヘッダー全体 (KDF パラメータ・ nonce を含む) が AAD として使われます。  
KDF パラメータのダウングレード・ヘッダーの差し替えは AEAD の認証タグ検証で検出されます。

### キーマテリアルの保護

- 一時ファイルは `/dev/shm` (Linux) または OS 標準テンポラリに配置
- セッション終了時に `crypto.Zero()` でメモリを上書き
- パスフレーズ入力時は `term.ReadPassword` でエコーを抑制
- リカバリーキー表示は `/dev/tty` (Unix) / `os.Stdout` (Windows) に直接書き込み

### 耐改ざん性

```
改ざん箇所      → 検出方法
----------------------------------------------------
KDF params      → Validate() 最小値チェック + AAD 不一致
payload         → Poly1305 タグ検証失敗 (ErrAuthFailed)
nonce           → AAD 不一致 → Poly1305 タグ検証失敗
wrapped_dek     → AEAD 認証失敗 (ErrAuthFailed)
recovery_wrap   → WrapAAD 不一致 → AEAD 認証失敗
```

### 原子書き込み

```
1. <file>.tmp に書き込み + fsync
2. <file> → <file>.bak にリネーム
3. <file>.tmp → <file> にリネーム
4. ディレクトリを fsync
```

クラッシュ後も `<file>` または `<file>.bak` のどちらかは必ず残り、復元できます。

### 既知の制限

| 項目 | 詳細 |
|------|------|
| `crypto.Zero` | GC による移動後のメモリは保証できない (best-effort) |
| keychain | ヘッドレス Linux (D-Bus なし) では無効 |
| リカバリー表示 | TTY 必須 (パイプ・リダイレクト不可) |
| `KPOT_PASSPHRASE` | セットしたまま使うと passphrase コマンドが同じパスフレーズで上書きされる |

<script>
(function(){
  const raw = document.getElementById('md-source').textContent.replace(/<\\\/script/g, '</script');
  marked.use({
    gfm: true,
    breaks: false,
    headerIds: true,
    mangle: false,
  });
  // Custom slug for Japanese headings: keep as-is, lowercase ASCII,
  // strip space → hyphen.
  const slugify = (text) => text
    .toLowerCase()
    .replace(/[\s]+/g, '-')
    .replace(/[^\w\u00C0-\uFFFF/-]/g, '')
    .replace(/^-+|-+$/g, '');
  const renderer = new marked.Renderer();
  const heading = renderer.heading.bind(renderer);
  renderer.heading = function(text, level, raw) {
    const slug = slugify(raw);
    return `<h${level} id="${slug}">${text}<a href="#${slug}" class="heading-anchor">#</a></h${level}>`;
  };
  renderer.code = function(code, lang) {
    let h;
    try { h = lang && hljs.getLanguage(lang) ? hljs.highlight(code, {language: lang}).value : hljs.highlightAuto(code).value; }
    catch(e) { h = code.replace(/[<&]/g, c => ({'<':'&lt;','&':'&amp;'}[c])); }
    return `<pre><button class="copy-btn">copy</button><code class="hljs ${lang||''}">${h}</code></pre>`;
  };
  marked.use({ renderer });

  document.getElementById('content').innerHTML = marked.parse(raw);

  // Build TOC.
  const tocList = document.getElementById('toc-list');
  document.querySelectorAll('article h2, article h3').forEach(h => {
    const li = document.createElement('li');
    if (h.tagName === 'H3') li.classList.add('h3');
    const a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent.replace(/#$/, '').trim();
    if (h.tagName === 'H3') a.style.paddingLeft = '1.5rem';
    li.appendChild(a);
    tocList.appendChild(li);
  });

  // Active section highlight on scroll.
  const headings = Array.from(document.querySelectorAll('article h2, article h3'));
  const tocLinks = Array.from(tocList.querySelectorAll('a'));
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        tocLinks.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#' + entry.target.id));
      }
    });
  }, { rootMargin: '-72px 0px -70% 0px' });
  headings.forEach(h => observer.observe(h));

  // Copy buttons.
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const code = btn.parentElement.querySelector('code').textContent;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = 'copied!';
        btn.classList.add('ok');
        setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('ok'); }, 1500);
      });
    });
  });
})();
</script>
