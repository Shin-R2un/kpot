name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # SCOOP_TOKEN is a fine-grained PAT with Contents:write on
          # Shin-R2un/scoop-bucket. Used by goreleaser's `scoops` block
          # to publish the kpot manifest after each release.
          SCOOP_TOKEN: ${{ secrets.SCOOP_TOKEN }}
