version: 2

project_name: kpot

before:
  hooks:
    - go mod tidy

builds:
  - id: kpot
    main: ./cmd/kpot
    binary: kpot
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - docs/*

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - 'Merge pull request'
      - 'Merge branch'

release:
  github:
    owner: Shin-R2un
    name: kpot
  draft: false
  prerelease: auto

scoops:
  - repository:
      owner: Shin-R2un
      name: scoop-bucket
      branch: main
      token: "{{ .Env.SCOOP_TOKEN }}"
    directory: bucket
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Update {{ .ProjectName }} to {{ .Tag }}"
    homepage: "https://github.com/Shin-R2un/kpot"
    description: "Encrypted CLI note vault: 1 file = 1 vault, with passphrase + recovery seed."
    # Only auto-publish on actual releases, never prereleases.
    skip_upload: auto
